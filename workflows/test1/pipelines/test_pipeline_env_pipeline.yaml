# Test Pipeline: Pipeline-Level Environment Switching
# 
# Tests that the ENTIRE pipeline runs in a different environment
# when "environment" is specified in metadata.
#
# IMPORTANT: Before running this test, change the "environment" value
# below to match an actual Conda environment on your system.

metadata:
  purpose: "Test pipeline-level environment switching"
  version: "2.0"
  verbose: 2
  functions_dir: "../steps"
  # Pipeline runs in env_b - tests from env_a and env_c will switch
  environment: "env_b"

# Workflow name
pipeline-env-test:
  - step_local:
      note: "This runs in env_b, not the calling environment"
      
  - step_local_2:
      note: "This also runs in env_b"
