# Test Pipeline: Local Execution Only
# 
# Tests that functions with environment: "local" execute in the main process.
# All steps should have the same process ID as the main script.
#
# Directory Structure:
#   analysis_workflows/workflows/test1/
#   ├── pipelines/
#   │   └── test_local_pipeline_v2.yaml  (this file)
#   └── steps/
#       └── step_local.py

metadata:
  purpose: "Test local execution (no isolation)"
  version: "2.0"
  verbose: 2
  # Functions are located relative to the pipeline file
  functions_dir: "../steps"

# Workflow name - can be any key other than 'metadata'
local-test:
  - step_local:
      test_param: "hello"
      number: 42
