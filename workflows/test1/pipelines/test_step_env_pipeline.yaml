# Test Pipeline: Step-Level Environment Switching
# 
# Tests that a step with "environment" in METADATA runs in the specified
# Conda environment.
#
# IMPORTANT: Before running this test, edit step_env.py and change
# the "environment" value in METADATA to match an actual Conda 
# environment on your system.

metadata:
  purpose: "Test step-level environment switching"
  version: "2.0"
  verbose: 2
  functions_dir: "../steps"

# Workflow name
step-env-test:
  - step_local:
      stage: "before_env_switch"
      
  - step_env:
      stage: "in_different_env"
      
  - step_local_2:
      stage: "after_env_switch"
